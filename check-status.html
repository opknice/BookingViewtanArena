<!doctype html>
<html lang="th">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เช็คสถานะ | VAR วิวตาล อารีน่า</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body data-page="status">
  <div class="app-shell">
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html" aria-label="VAR วิวตาล อารีน่า">
          <span class="brand-kicker">VAR วิวตาล อารีน่า</span>
          <span class="brand-title">สนามหญ้าเทียมเพชรบุรี</span>
          <span class="brand-subtitle">เปิดทุกวัน 06:00 - 24:00 น.</span>
        </a>

        <nav class="top-nav" aria-label="เมนูหลัก">
          <a class="nav-btn" href="index.html">จองสนาม</a>
          <a class="nav-btn active" href="check-status.html">เช็คสถานะ</a>
        </nav>
      </div>
    </header>

    <main class="main-layout">
      <section class="status-page">
        <div class="status-card">
          <p class="slots-eyebrow">Booking status</p>
          <h1>เช็คสถานะการจอง</h1>
          <p class="status-intro">กรอกเบอร์โทรที่ใช้ตอนจองเพื่อดูรายการของคุณ</p>

          <form class="status-search" data-status-form novalidate>
            <input type="tel" name="phone" inputmode="numeric" maxlength="10"
              placeholder="เบอร์โทร 10 หลัก เช่น 0812345678" required>
            <button class="btn btn-primary" type="submit">ค้นหา</button>
          </form>
          <p class="form-message" data-status-message></p>

          <div class="result-list" data-status-results></div>
        </div>
      </section>
    </main>
  </div>

  <script src="firebase-config.js"></script>
  <script src="assets/js/main.js"></script>
</body>

</html>
